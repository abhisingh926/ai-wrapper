version: "3.8"

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: aiw_db
    restart: always
    environment:
      POSTGRES_DB: ai_wrapper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: aiw_redis
    restart: always
    volumes:
      - redisdata:/data

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiw_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-changeme}@db:5432/ai_wrapper
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost/api}
        NEXT_PUBLIC_WA_BRIDGE_URL: ${FRONTEND_WA_URL:-http://localhost/wa}
    container_name: aiw_frontend
    restart: always

  # ── WhatsApp Bridge ──
  wa-bridge:
    build:
      context: ./backend/whatsapp-bridge
      dockerfile: Dockerfile
    container_name: aiw_wa_bridge
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - wa_auth:/app/auth

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: aiw_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - wa-bridge

  # ── Certbot (SSL) ──
  certbot:
    image: certbot/certbot
    container_name: aiw_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  pgdata:
  redisdata:
  wa_auth:
  certbot_data:
  certbot_www:
